- plugin_id: 1
  product_id: 1
  version: "v2.0.0"
  openapi_doc_file: "narrator_ai_api.yaml"
  plugin_type: 1
  deprecated: false

  manifest:
    schema_version: "v1"
    name_for_model: "narrator_ai"
    name_for_human: "Narrator AI"
    description_for_model: |
      AI narrated video creation tool. Create narration scripts and compose videos with AI.
      Two workflow paths:
      1. Standard (二创文案): popular-learning -> generate-writing -> clip-data -> video-composing -> magic-video
      2. Fast (原创文案): search-movie -> fast-writing -> fast-clip-data -> video-composing -> magic-video
      Key rules:
      - Always use search-movie before fast-writing with target_mode=1. Do NOT fabricate confirmed_movie_json.
      - video-composing uses generate-writing's order_num (standard) or fast-clip-data's order_num (fast).
      - Poll task status with query until status=2 (success) or status=3 (failed).
      - Prefer pre-built narration templates over running popular-learning.
    description_for_human: "AI narrated video creation - generate narration scripts and compose videos automatically"
    logo_url: "default_icon/plugin_default_icon.png"

    auth:
      type: "service_http"
      sub_type: "api_key"
      payload: '{"location": "header", "key": "app-key", "service_token": ""}'

    api:
      type: "openapi"

    common_params:
      header: []
      path: []
      query: []
      body: []

